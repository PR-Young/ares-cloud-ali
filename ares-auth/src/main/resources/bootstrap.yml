# Tomcat
server:
  port: 8088
  servlet:
    context-path: /auth

# Spring
spring:
  application:
    # 应用名称
    name: ares-auth
  profiles:
    # 环境配置
    active: dev
  main:
    allow-circular-references: true
    allow-bean-definition-overriding: true
  cloud:
    nacos:
      discovery:
        # 服务注册地址
        server-addr: 127.0.0.1:18848
        username: nacos
        password: nacos
      config:
        # 配置中心地址
        server-addr: 127.0.0.1:18848
        username: nacos
        password: nacos
        # 配置文件格式
        file-extension: yml
        # 共享配置
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
    sentinel:
      enabled: true
      eager: true
      transport:
        dashboard: 127.0.0.1:18858

dubbo:
  application:
    name: ares-auth-dubbo
  registry:
    address: nacos://localhost:18848
    username: nacos
    password: nacos
  config-center:
    address: nacos://localhost:18848
    username: nacos
    password: nacos
  monitor:
    address: nacos://localhost:18848
    username: nacos
    password: nacos
  protocol:
    # dubbo 协议
    name: dubbo
    # dubbo 协议端口（ -1 表示自增端口，从 20880 开始）
    port: -1
  consumer:
    check: false
    timeout: 100000
